name: Profile Scan

on:
  schedule:
    - cron: '0 8 * * 1,4'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - '.trivyignore.yaml'
      - '.github/workflows/container-scan.yml'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - '.trivyignore.yaml'
      - '.github/workflows/container-scan.yml'
permissions: {}
jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required to checkout and read repo files
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build the Docker image
        run: docker build . --tag altinn-profile:${{github.sha}}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 'altinn-profile:${{ github.sha }}'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore.yaml'
          format: 'sarif'
          output: 'trivy-results.sarif'
          limit-severities-for-sarif: true
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db,aquasec/trivy-db,ghcr.io/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db,aquasec/trivy-java-db,ghcr.io/aquasecurity/trivy-java-db
          TRIVY_SHOW_SUPPRESSED: true
      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-sarif
          path: 'trivy-results.sarif'
          retention-days: 1

  upload-sarif:
    needs: scan
    if: always()
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required to upload SARIF files to Security tab
    steps:
      - name: Download SARIF artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: trivy-sarif
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: 'trivy-results.sarif'
