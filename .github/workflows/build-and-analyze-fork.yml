name: Code test and analysis (fork)
on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]

permissions: {}

jobs:
  test:
    if: github.actor == 'dependabot[bot]' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17.10@sha256:2203e6282d9e7de7c24d7da234e2a744fb325df366a3fd8ed940e8abbee39527
        env:
          POSTGRES_USER: platform_profile_admin
          POSTGRES_PASSWORD: Password
          POSTGRES_DB: profiledb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            10.0.x
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Setup PostgreSQL
        run: |
          chmod +x dbsetup.sh
          ./dbsetup.sh
      - name: Restart database to enable config changes
        run: |
          docker restart $(docker ps -q)

      - name: dotnet build
        run: dotnet build Altinn.Profile.sln -v m

      - name: dotnet migrate
        run: dotnet run --project src/Altinn.Profile/Altinn.Profile.csproj --configuration Release -- --run-db-migrations --setup-wolverine

      - name: dotnet test
        run: dotnet test Altinn.Profile.sln --results-directory TestResults/ --collect:"XPlat Code Coverage" -v m

      - name: Generate coverage results
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator -reports:TestResults/**/coverage.cobertura.xml -targetdir:TestResults/Output/CoverageReport -reporttypes:Cobertura

      - name: Archive code coverage results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: code-coverage-report
          path: TestResults/Output/CoverageReport/

  code-coverage:
    if: github.actor == 'dependabot[bot]' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)
    name: Report code coverage
    runs-on: ubuntu-latest
    needs: test
    permissions: {}
    steps:
      - name: Download Coverage Results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: code-coverage-report
          path: dist/
      - name: Create Coverage Summary Report
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          filename: dist/Cobertura.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '60 80'

     # Step disabled until workaround available for commenting PR
     # - name: Add Coverage PR Comment
     #   uses: marocchino/sticky-pull-request-comment@v2
     #   with:
     #     recreate: true
     #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
     #     path: code-coverage-results.md
